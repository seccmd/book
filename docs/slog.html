<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureLog Analyzer - 安全日志分析系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            text-align: center;
            color: #a0aec0;
            margin-bottom: 30px;
            font-size: 1.1em;
            line-height: 1.8;
        }
        .subtitle-tagline {
            display: block;
            font-size: 0.9em;
            color: #7dd3fc;
            margin-top: 8px;
        }
        .upload-area {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .upload-area.dragover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }
        .upload-area.hidden {
            display: none;
        }
        .upload-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
        #fileInput {
            display: none;
        }
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
            box-shadow: 0 5px 20px rgba(102,126,234,0.3);
        }
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.5);
        }
        .demo-btn {
            background: rgba(255,255,255,0.15);

            border: 2px solid rgba(255,255,255,0.3);

            border-radius: 30px;

        .button-group {

            justify-content: center;
            flex-wrap: wrap;
        }

        }
        .dashboard {
            display: none;
        }
        .dashboard.active {
            display: block;
        }
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav-tab {
            background: rgba(255,255,255,0.1);
            color: #a0aec0;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;

            font-size: 1em;

        }
        .nav-tab:hover {

        }
        .nav-tab.active {

        }
        .tab-content {

        }
        .tab-content.active {

        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card.danger { border-top: 4px solid #f44336; }
        .stat-card.warning { border-top: 4px solid #ff9800; }
        .stat-card.success { border-top: 4px solid #4caf50; }
        .stat-card.info { border-top: 4px solid #2196f3; }
        .stat-label {

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));

            margin-bottom: 30px;
        }
        .chart-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
        }
        .chart-title {
            font-size: 1.2em;
            color: white;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .incident-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;

        }
        .incident-header {

        }
        .incident-ip {

        }
        .incident-details {

        }

        }
        .incident-detail-label {
            color: #a0aec0;

        }
        .incident-detail-value {

        .user-attempts {

        .user-badge {

        .view-logs-btn {

        .view-logs-btn:hover {

            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {

        }
        .filter-bar input::placeholder {

        }
        .filter-bar input:focus, .filter-bar select:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255,255,255,0.15);
        }
        .filter-bar select option {
            background: #1a1a2e;
            color: white;
        }
        .reset-btn, .export-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .reset-btn:hover, .export-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .export-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .log-table th {
            background: rgba(255,255,255,0.1);
            padding: 14px;
            text-align: left;
            font-weight: bold;
            color: white;

            top: 0;
        }
        .log-table td {
            padding: 12px 14px;

            color: #e0e0e0;
        }
        .log-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        .log-table-container {
            max-height: 700px;
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .event-type {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .event-type.failed { background: rgba(244, 67, 54, 0.3); color: #ff6659; }
        .event-type.success { background: rgba(76, 175, 80, 0.3); color: #69f0ae; }
        .event-type.invalid { background: rgba(255, 152, 0, 0.3); color: #ffb74d; }
        .event-type.error { background: rgba(244, 67, 54, 0.3); color: #ff6659; }
        .event-type.other { background: rgba(33, 150, 243, 0.3); color: #64b5f6; }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .new-upload-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .new-upload-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .file-info {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .pagination button {
            padding: 10px 18px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination button:hover:not(:disabled) {
            background: rgba(255,255,255,0.2);
        }
        .pagination button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .page-info {
            padding: 10px 18px;
            color: #a0aec0;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading h2, .loading p {
            color: white;
        }
        .active-filter {
            display: inline-flex;
            align-items: center;
            background: rgba(102, 126, 234, 0.3);
            border: 1px solid #667eea;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            margin-bottom: 15px;
        }
        .active-filter span {
            margin-right: 10px;
        }
        .clear-filter {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            cursor: pointer;
            margin-left: 10px;
        }
        .clear-filter:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 SecureLog Analyzer</h1>
        <p class="subtitle">
            安全日志分析系统
            <span class="subtitle-tagline">🔒 数据安全 · 纯前端分析 · 日志文件不上传</span>
        </p>

        <!-- Upload Area -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <h2>上传安全日志文件</h2>
            <p>支持 Linux secure / auth.log 格式，拖拽文件到此处或点击选择</p>
            <input type="file" id="fileInput">
            <div class="button-group">
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
                <button class="demo-btn" onclick="loadDemoData()">功能演示</button>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="dashboard" id="dashboard">
            <div class="file-info">
                <div>
                    <strong>📄 文件：</strong><span id="fileName"></span>
                    <span style="margin-left: 20px; color: #a0aec0;">
                        <strong>处理时间：</strong><span id="processTime"></span>ms
                    </span>
                </div>
                <button class="new-upload-btn" onclick="resetDashboard()">📤 上传新文件</button>
            </div>

            <!-- Navigation Tabs -->
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchTab('overview')">📊 概览统计</button>
                <button class="nav-tab" onclick="switchTab('intrusion')">📍 IP分析</button>
                <button class="nav-tab" onclick="switchTab('logs')">📝 原始日志</button>
            </div>

            <!-- Overview Tab -->
            <div class="tab-content active" id="overview-tab">
                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card danger">
                        <div class="stat-label">🔴 登录失败次数</div>
                        <div class="stat-value" id="failedCount">0</div>
                        <div class="stat-detail" id="failedDetail"></div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-label">🟠 无效用户尝试</div>
                        <div class="stat-value" id="invalidCount">0</div>
                        <div class="stat-detail" id="invalidDetail"></div>
                    </div>
                    <div class="stat-card success">
                        <div class="stat-label">🟢 登录成功次数</div>
                        <div class="stat-value" id="successCount">0</div>
                        <div class="stat-detail" id="successDetail"></div>
                    </div>
                    <div class="stat-card info">
                        <div class="stat-label">🔵 总日志行数</div>
                        <div class="stat-value" id="totalCount">0</div>
                    </div>
                    <div class="stat-card danger">
                        <div class="stat-label">⚠️ 攻击源 IP</div>
                        <div class="stat-value" id="attackerCount">0</div>
                        <div class="stat-detail" id="attackerDetail"></div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-label">🔍 被尝试用户名</div>
                        <div class="stat-value" id="userCount">0</div>
                        <div class="stat-detail" id="userDetail"></div>
                    </div>
                </div>

                <!-- Charts -->
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="chart-title">📊 攻击来源 TOP 10</div>
                        <canvas id="ipChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <div class="chart-title">📈 事件时间分布</div>
                        <canvas id="timeChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <div class="chart-title">🎯 被尝试用户名 TOP 10</div>
                        <canvas id="userChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <div class="chart-title">📋 事件类型分布</div>
                        <canvas id="typeChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- IP Analysis Tab -->
            <div class="tab-content" id="intrusion-tab">
                <div id="incidentsList">
                </div>
            </div>

            <!-- Logs Tab -->
            <div class="tab-content" id="logs-tab">
                <div class="log-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="color: white;">📝 原始日志详情</h3>
                        <button class="export-btn" onclick="exportReport()">📄 导出报告</button>
                    </div>
                    <div id="activeFilterDisplay"></div>
                    <div class="filter-bar">
                        <select id="filterType">
                            <option value="">所有事件类型</option>
                            <option value="failed">登录失败</option>
                            <option value="success">登录成功</option>
                            <option value="invalid">无效用户</option>
                            <option value="error">错误</option>
                            <option value="other">其他</option>
                        </select>
                        <input type="text" id="filterIP" placeholder="按 IP 搜索...">
                        <input type="text" id="filterUser" placeholder="按用户名搜索...">
                        <input type="text" id="filterSearch" placeholder="全文搜索...">
                        <button class="reset-btn" onclick="resetFilters()">重置筛选</button>
                    </div>
                    <div class="log-table-container">
                        <table class="log-table">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>类型</th>
                                    <th>IP地址</th>
                                    <th>用户</th>
                                    <th>消息</th>
                                </tr>
                            </thead>
                            <tbody id="logTableBody">
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" id="pagination">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let logs = [];
        let filteredLogs = [];
        let currentPage = 1;
        let activeIPFilter = null;
        const pageSize = 100;
        let charts = {};
        let incidents = [];

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) processFile(file);
        });

        // 模拟数据生成
        function loadDemoData() {
            const startTime = performance.now();
            showLoading();

            setTimeout(() => {
                const content = generateDemoLogs();
                logs = parseLogs(content);
                filteredLogs = [...logs];

                incidents = analyzeIncidents(logs);

                const endTime = performance.now();

                document.getElementById('fileName').textContent = 'secure-demo.log';
                document.getElementById('processTime').textContent = Math.round(endTime - startTime);

                updateStats();
                renderIncidents(incidents);
                createCharts();
                updateLogTable();

                hideLoading();
                showDashboard();
            }, 500);
        }

        function generateDemoLogs() {
            const lines = [];
            const hostname = 'server-prod-01';

            // 模拟攻击者IP
            const attackerIPs = [
                '192.168.1.105', '10.0.0.55', '172.16.30.45',
                '203.0.113.85', '198.51.100.77', '192.0.2.123',
                '45.33.32.156', '185.220.101.34', '91.121.45.67',
                '89.248.166.20', '104.236.110.112', '159.203.109.142'
            ];

            // 模拟正常用户IP
            const normalIPs = [
                '192.168.1.10', '192.168.1.20', '10.0.0.50',
                '172.16.0.100', '192.168.10.5'
            ];

            // 模拟的用户名列表
            const usernames = [
                'root', 'admin', 'test', 'user', 'ubuntu',
                'guest', 'mysql', 'postgres', 'apache', 'www-data',
                'ftp', 'git', 'jenkins', 'docker', 'kali',
                'nginx', 'tomcat', 'deploy', 'ansible', 'node'
            ];

            // 无效用户名
            const invalidUsers = [
                'admin123', 'test123', 'user123', 'root123',
                'temp', 'tmp', 'backup', 'old', 'new',
                'user1', 'user2', 'demo', 'sample'
            ];

            let currentMinute = 0;
            const logCount = 800 + Math.floor(Math.random() * 300); // 800-1100条

            for (let i = 0; i < logCount; i++) {
                const timestamp = generateTimestamp('Mar 18', currentMinute);
                const rand = Math.random();

                if (rand < 0.45) {
                    // 45% 登录失败
                    const isInvalidUser = Math.random() < 0.3;
                    const user = isInvalidUser ? invalidUsers[Math.floor(Math.random() * invalidUsers.length)] : usernames[Math.floor(Math.random() * usernames.length)];
                    const ip = attackerIPs[Math.floor(Math.random() * attackerIPs.length)];
                    lines.push(`${timestamp} ${hostname} sshd[${Math.floor(1000 + Math.random() * 9000)}]: Failed password for ${isInvalidUser ? 'invalid user ' : ''}${user} from ${ip} port ${Math.floor(10000 + Math.random() * 50000)} ssh2`);
                } else if (rand < 0.55) {
                    // 10% 无效用户
                    const user = invalidUsers[Math.floor(Math.random() * invalidUsers.length)];
                    const ip = attackerIPs[Math.floor(Math.random() * attackerIPs.length)];
                    lines.push(`${timestamp} ${hostname} sshd[${Math.floor(1000 + Math.random() * 9000)}]: Invalid user ${user} from ${ip}`);
                } else if (rand < 0.65) {
                    // 10% 登录成功
                    const isSuspicious = Math.random() < 0.3;
                    const user = isSuspicious ? 'root' : ['admin', 'ubuntu', 'deploy'][Math.floor(Math.random() * 3)];
                    const ip = isSuspicious ? attackerIPs[Math.floor(Math.random() * attackerIPs.length)] : normalIPs[Math.floor(Math.random() * normalIPs.length)];
                    lines.push(`${timestamp} ${hostname} sshd[${Math.floor(1000 + Math.random() * 9000)}]: Accepted password for ${user} from ${ip} port ${Math.floor(10000 + Math.random() * 50000)} ssh2`);
                } else if (rand < 0.72) {
                    // 7% 连接错误 / MaxStartups
                    const ip = attackerIPs[Math.floor(Math.random() * attackerIPs.length)];
                    if (Math.random() < 0.3) {
                        lines.push(`${timestamp} ${hostname} sshd[${Math.floor(1000 + Math.random() * 9000)}]: error: kex_exchange_identification: Connection closed by remote host`);
                    } else {
                        lines.push(`${timestamp} ${hostname} sshd[${Math.floor(1000 + Math.random() * 9000)}]: drop connection #${Math.floor(10 + Math.random() * 20)} from [${ip}]:${Math.floor(10000 + Math.random() * 50000)} on [10.0.0.10]:22 past MaxStartups`);
                    }
                } else if (rand < 0.80) {
                    // 8% 连接相关
                    const ip = Math.random() < 0.7 ? attackerIPs[Math.floor(Math.random() * attackerIPs.length)] : normalIPs[Math.floor(Math.random() * normalIPs.length)];
                    if (Math.random() < 0.5) {
                        lines.push(`${timestamp} ${hostname} sshd[${Math.floor(1000 + Math.random() * 9000)}]: Connection from ${ip} port ${Math.floor(10000 + Math.random() * 50000)} on 10.0.0.10 port 22`);
                    } else {
                        lines.push(`${timestamp} ${hostname} sshd[${Math.floor(1000 + Math.random() * 9000)}]: Received disconnect from ${ip} port ${Math.floor(10000 + Math.random() * 50000)}:11: disconnected by user`);
                    }
                } else if (rand < 0.90) {
                    // 10% 其他服务
                    const services = ['polkitd', 'systemd', 'login'];
                    const service = services[Math.floor(Math.random() * services.length)];
                    if (service === 'polkitd') {
                        lines.push(`${timestamp} ${hostname} polkitd[${Math.floor(500 + Math.random() * 500)}]: Acquired the name org.freedesktop.PolicyKit1 on the system bus`);
                    } else if (service === 'systemd') {
                        lines.push(`${timestamp} ${hostname} systemd[${Math.floor(1000 + Math.random() * 2000)}]: pam_unix(systemd-user:session): session opened for user root(uid=0) by (uid=0)`);
                    } else {
                        lines.push(`${timestamp} ${hostname} login[${Math.floor(1000 + Math.random() * 1000)}]: ROOT LOGIN ON tty1`);
                    }
                } else {
                    // 10% 会话相关
                    const ip = normalIPs[Math.floor(Math.random() * normalIPs.length)];
                    lines.push(`${timestamp} ${hostname} sshd[${Math.floor(1000 + Math.random() * 9000)}]: pam_unix(sshd:session): session opened for user ${usernames[Math.floor(Math.random() * 5)]} by (uid=0)`);
                }

                // 增加时间
                if (Math.random() < 0.15) {
                    currentMinute += Math.random() * 5;
                } else {
                    currentMinute += Math.random() * 30;
                }
            }

            return lines.join('\n');
        }

        function generateTimestamp(startDay, minutesOffset) {
            const startMonth = startDay.split(' ')[0];
            let day = parseInt(startDay.split(' ')[1]);
            const daysToAdd = Math.floor(minutesOffset / 1440);
            day += daysToAdd;
            const minutesInDay = minutesOffset % 1440;
            const hours = Math.floor(minutesInDay / 60);
            const mins = minutesInDay % 60;
            const secs = Math.floor(Math.random() * 60);
            return `${startMonth} ${String(day).padStart(2, ' ')} ${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function processFile(file) {
            const startTime = performance.now();
            const reader = new FileReader();

            showLoading();

            reader.onload = (e) => {
                const content = e.target.result;
                logs = parseLogs(content);
                filteredLogs = [...logs];

                incidents = analyzeIncidents(logs);

                const endTime = performance.now();

                document.getElementById('fileName').textContent = file.name;
                document.getElementById('processTime').textContent = Math.round(endTime - startTime);

                updateStats();
                renderIncidents(incidents);
                createCharts();
                updateLogTable();

                hideLoading();
                showDashboard();
            };

            reader.readAsText(file);
        }

        function parseLogs(content) {
            const lines = content.split('\n');
            const parsed = [];

            lines.forEach((line, index) => {
                if (!line.trim()) return;

                const log = parseLine(line);
                if (log) {
                    log.lineIndex = index;
                    parsed.push(log);
                }
            });

            return parsed;
        }

        function parseLine(line) {
            const result = {
                raw: line,
                timestamp: null,
                type: 'other',
                ip: null,
                user: null,
                message: line
            };

            const timeMatch = line.match(/^(\w+\s+\d+\s+\d+:\d+:\d+)/);
            if (timeMatch) {
                result.timestamp = timeMatch[1];
            }

            if (/Failed password/i.test(line)) {
                result.type = 'failed';
                const userMatch = line.match(/for\s+(invalid user\s+)?(\S+)\s+from\s+(\S+)/i);
                if (userMatch) {
                    result.user = userMatch[2];
                    result.ip = userMatch[3];
                }
                result.message = '登录失败';
            } else if (/Accepted password/i.test(line)) {
                result.type = 'success';
                const userMatch = line.match(/for\s+(\S+)\s+from\s+(\S+)/i);
                if (userMatch) {
                    result.user = userMatch[1];
                    result.ip = userMatch[2];
                }
                result.message = '登录成功';
            } else if (/Invalid user/i.test(line)) {
                result.type = 'invalid';
                const userMatch = line.match(/Invalid user\s+(\S+)\s+from\s+(\S+)/i);
                if (userMatch) {
                    result.user = userMatch[1];
                    result.ip = userMatch[2];
                }
                result.message = '无效用户尝试';
            } else if (/error:/i.test(line) || /error/i.test(line)) {
                result.type = 'error';
                const ipMatch = line.match(/\[(\d+\.\d+\.\d+\.\d+)\]:\d+/);
                if (ipMatch) result.ip = ipMatch[1];
                const ipMatch2 = line.match(/from\s+(\d+\.\d+\.\d+\.\d+)/);
                if (ipMatch2) result.ip = ipMatch2[1];
                result.message = '连接错误';
            } else if (/Connection from/i.test(line)) {
                const ipMatch = line.match(/Connection from\s+(\S+)/);
                if (ipMatch) result.ip = ipMatch[1];
                result.message = '连接请求';
            } else if (/disconnect/i.test(line)) {
                const ipMatch = line.match(/(\d+\.\d+\.\d+\.\d+)/);
                if (ipMatch) result.ip = ipMatch[1];
                result.message = '连接断开';
            } else {
                const ipMatch = line.match(/(\d+\.\d+\.\d+\.\d+)/);
                if (ipMatch) result.ip = ipMatch[1];
            }

            return result;
        }

        function analyzeIncidents(logs) {
            const ipData = {};

            logs.forEach(log => {
                if (!log.ip) return;

                if (!ipData[log.ip]) {
                    ipData[log.ip] = {
                        ip: log.ip,
                        failedAttempts: 0,
                        successAttempts: 0,
                        invalidUsers: new Set(),
                        validUsers: new Set(),
                        allUsers: new Set(),
                        events: [],
                        firstSeen: null,
                        lastSeen: null,
                        maxStartups: false
                    };
                }

                const data = ipData[log.ip];
                data.events.push(log);

                if (log.type === 'failed') {
                    data.failedAttempts++;
                } else if (log.type === 'success') {
                    data.successAttempts++;
                } else if (log.type === 'invalid') {
                    data.invalidUsers.add(log.user);
                }

                if (log.user) {
                    data.allUsers.add(log.user);
                    if (log.type !== 'invalid') {
                        data.validUsers.add(log.user);
                    }
                }

                if (/MaxStartups/i.test(log.raw)) {
                    data.maxStartups = true;
                }

                if (log.timestamp && (!data.firstSeen || log.lineIndex < data.firstSeen.lineIndex)) {
                    data.firstSeen = { timestamp: log.timestamp, lineIndex: log.lineIndex };
                }
                if (log.timestamp && (!data.lastSeen || log.lineIndex > data.lastSeen.lineIndex)) {
                    data.lastSeen = { timestamp: log.timestamp, lineIndex: log.lineIndex };
                }
            });

            return Object.values(ipData).map(data => {
                data.events.sort((a, b) => a.lineIndex - b.lineIndex);
                return data;
            }).sort((a, b) => b.events.length - a.events.length);
        }

                const mostTargeted = userAttempts[0];

                return `

                        </div>

                </div>
            `;
            }).join('');
        }

        function updateStats() {
            const failed = logs.filter(l => l.type === 'failed').length;
            const invalid = logs.filter(l => l.type === 'invalid').length;
            const success = logs.filter(l => l.type === 'success').length;

            document.getElementById('failedCount').textContent = failed.toLocaleString();
            document.getElementById('invalidCount').textContent = invalid.toLocaleString();
            document.getElementById('successCount').textContent = success.toLocaleString();
            document.getElementById('totalCount').textContent = logs.length.toLocaleString();

            const ipCounts = {};
            const userCounts = {};

            logs.forEach(log => {
                if (log.ip) {
                    ipCounts[log.ip] = (ipCounts[log.ip] || 0) + 1;
                }
                if (log.user) {
                    userCounts[log.user] = (userCounts[log.user] || 0) + 1;
                }
            });

            const sortedIPs = Object.entries(ipCounts).sort((a, b) => b[1] - a[1]);
            const sortedUsers = Object.entries(userCounts).sort((a, b) => b[1] - a[1]);

            document.getElementById('attackerCount').textContent = Object.keys(ipCounts).length;
            document.getElementById('userCount').textContent = Object.keys(userCounts).length;

            if (sortedIPs.length > 0) {
                const topIp = sortedIPs[0];
                document.getElementById('attackerDetail').textContent = `最活跃: ${topIp[0]} (${topIp[1].toLocaleString()}次)`;
            }
            if (sortedUsers.length > 0) {
                const topUser = sortedUsers[0];
                document.getElementById('userDetail').textContent = `最常尝试: ${topUser[0]} (${topUser[1].toLocaleString()}次)`;
            }

            const failedIPs = logs.filter(l => l.type === 'failed' && l.ip).reduce((acc, l) => {
                acc[l.ip] = (acc[l.ip] || 0) + 1;
                return acc;
            }, {});
            const sortedFailedIPs = Object.entries(failedIPs).sort((a, b) => b[1] - a[1]);
            if (sortedFailedIPs.length > 0) {
                document.getElementById('failedDetail').textContent = `主要来自: ${sortedFailedIPs[0][0]}`;
            }

            const invalidUsers = logs.filter(l => l.type === 'invalid' && l.user).reduce((acc, l) => {
                acc[l.user] = (acc[l.user] || 0) + 1;
                return acc;
            }, {});
            const sortedInvalidUsers = Object.entries(invalidUsers).sort((a, b) => b[1] - a[1]);
            if (sortedInvalidUsers.length > 0) {
                document.getElementById('invalidDetail').textContent = `最常见: ${sortedInvalidUsers[0][0]}`;
            }

            const successIPs = logs.filter(l => l.type === 'success' && l.ip).reduce((acc, l) => {
                acc[l.ip] = (acc[l.ip] || 0) + 1;
                return acc;
            }, {});
            const sortedSuccessIPs = Object.entries(successIPs).sort((a, b) => b[1] - a[1]);
            if (sortedSuccessIPs.length > 0) {
                document.getElementById('successDetail').textContent = `成功来源: ${sortedSuccessIPs[0][0]}`;
            }
        }

            const userCounts = {};

            logs.forEach(log => {
                if (log.ip) {

                }
                if (log.type) {
                    typeCounts[log.type] = (typeCounts[log.type] || 0) + 1;
                }
                if (log.timestamp) {
                    const hourMatch = log.timestamp.match(/(\d+):/);
                    if (hourMatch) {
                        const hour = hourMatch[1];
                        timeCounts[hour] = (timeCounts[hour] || 0) + 1;
                    }

        function updateLogTable() {
            const tbody = document.getElementById('logTableBody');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageLogs = filteredLogs.slice(start, end);

            tbody.innerHTML = pageLogs.map(log => `
                <tr>
                    <td>${log.timestamp || '-'}</td>
                    <td><span class="event-type ${log.type}">${getTypeName(log.type)}</span></td>
                    <td>${log.ip || '-'}</td>
                    <td>${log.user ? escapeHtml(log.user) : '-'}</td>
                    <td style="max-width: 500px; overflow: hidden; text-overflow: ellipsis;" title="${escapeHtml(log.raw)}">${escapeHtml(log.raw.substring(0, 120))}${log.raw.length > 120 ? '...' : ''}</td>
                </tr>
            `).join('');

            updatePagination();
        }

        function getTypeName(type) {
            const names = {
                failed: '登录失败',
                success: '登录成功',
                invalid: '无效用户',
                error: '错误',
                other: '其他'
            };
            return names[type] || type;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updatePagination() {
            const totalPages = Math.ceil(filteredLogs.length / pageSize);
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `
                <button onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>
                <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
                <span class="page-info">第 ${currentPage} / ${totalPages} 页</span>
                <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                <button onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>
            `;

            pagination.innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(filteredLogs.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            updateLogTable();
        }

        function applyFilters() {
            const type = document.getElementById('filterType').value;
            const ip = document.getElementById('filterIP').value.toLowerCase();
            const user = document.getElementById('filterUser').value.toLowerCase();
            const search = document.getElementById('filterSearch').value.toLowerCase();

            filteredLogs = logs.filter(log => {
                if (type && log.type !== type) return false;
                if (ip && (!log.ip || !log.ip.toLowerCase().includes(ip))) return false;
                if (user && (!log.user || !log.user.toLowerCase().includes(user))) return false;
                if (search && !log.raw.toLowerCase().includes(search)) return false;
                return true;
            });

            currentPage = 1;
            updateLogTable();
        }

        function resetFilters() {
            document.getElementById('filterType').value = '';
            document.getElementById('filterIP').value = activeIPFilter || '';
            document.getElementById('filterUser').value = '';
            document.getElementById('filterSearch').value = '';
            filteredLogs = [...logs];
            currentPage = 1;
            applyFilters();
            updateActiveFilterDisplay();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
        }

        function exportReport() {
            let report = `
╔══════════════════════════════════════════════════════════════╗
║                SECURELOG ANALYZER 分析报告                     ║
╚══════════════════════════════════════════════════════════════╝

生成时间: ${new Date().toLocaleString()}
分析文件: ${document.getElementById('fileName').textContent}

【统计概览】
════════════════════════════════════════════════════════════════
总日志行数: ${logs.length.toLocaleString()}
登录失败: ${logs.filter(l => l.type === 'failed').length.toLocaleString()}
登录成功: ${logs.filter(l => l.type === 'success').length.toLocaleString()}
无效用户: ${logs.filter(l => l.type === 'invalid').length.toLocaleString()}
攻击源IP: ${incidents.length.toLocaleString()}
尝试用户名: ${[...new Set(logs.filter(l => l.user).map(l => l.user))].length.toLocaleString()}

【IP统计 TOP 20】
════════════════════════════════════════════════════════════════
`;

            const sortedByAttempts = [...incidents].sort((a, b) => b.events.length - a.events.length);
            sortedByAttempts.slice(0, 20).forEach((i, idx) => {
                report += `  ${String(idx + 1).padStart(2, ' ')}. ${i.ip.padEnd(16)} 失败:${String(i.failedAttempts).padEnd(6)} 成功:${String(i.successAttempts).padEnd(4)} 用户:${i.allUsers.size}\n`;
            });

            report += `\n【建议措施】\n`;
            report += `════════════════════════════════════════════════════════════════\n`;
            report += `  - 安装并配置 fail2ban 自动封禁暴力破解IP\n`;
            report += `  - 禁用 root 直接SSH登录，使用普通用户+sudo\n`;
            report += `  - 启用 SSH 密钥认证，禁用密码认证\n`;
            report += `  - 配置登录告警通知\n`;

            report += `\n╔══════════════════════════════════════════════════════════════╗\n`;
            report += `║   报告结束 - 如需详细信息，请查看原始日志文件                  ║\n`;
            report += `╚══════════════════════════════════════════════════════════════╝\n`;

            const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `securelog-analysis-${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Set up event listeners after load
        setTimeout(() => {
            const filterType = document.getElementById('filterType');
            const filterIP = document.getElementById('filterIP');
            const filterUser = document.getElementById('filterUser');
            const filterSearch = document.getElementById('filterSearch');

            if (filterType) filterType.addEventListener('change', applyFilters);
            if (filterIP) filterIP.addEventListener('input', function() {
                if (!this.value) activeIPFilter = null;
                updateActiveFilterDisplay();
                applyFilters();
            });
            if (filterUser) filterUser.addEventListener('input', applyFilters);
            if (filterSearch) filterSearch.addEventListener('input', applyFilters);
        }, 100);
    </script>
</body>
</html>
